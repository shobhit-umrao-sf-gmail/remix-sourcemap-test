name: Upload Sourcemaps to New Relic

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  upload-sourcemaps:
    runs-on: ubuntu-latest
    name: Build and Upload Sourcemaps

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Get git commit SHA
        id: commit
        run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Build project
        run: npm run build

      - name: Upload sourcemaps to New Relic
        run: npm run upload-sourcemaps
        env:
          NR_API_KEY: ${{ secrets.NR_API_KEY }}
          NR_APPLICATION_ID: ${{ secrets.NR_APPLICATION_ID }}
          BASE_URL: https://remix-sourcemap-test.bitcrypt.in
          RELEASE_ID: ${{ steps.commit.outputs.sha }}

      - name: List uploaded sourcemaps
        if: success()
        run: npm run list-sourcemaps
        env:
          NR_API_KEY: ${{ secrets.NR_API_KEY }}
          NR_APPLICATION_ID: ${{ secrets.NR_APPLICATION_ID }}
